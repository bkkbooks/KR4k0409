body:
  text: 襄陽耆舊傳宋玉宋玉者楚之鄢人也故宜城有宋玉環始事屈原原既放逐求事楚友景差懼其勝已言於王王以為小臣玉讓其友友謝之復言於王王識音而善文襄王好樂愛賦既美其才而憎之似屈原也曰子盍從俗使楚人貴子之德乎對曰昔楚有善歌者始而曰下里巴人國中屬而和之者數百人既而曰陽春白雪朝日魚離國中屬而和之者不至十人含商吐角絕倫赴曲國中屬而和之者不至三人矣其曲彌高其和彌寡龐德公後漢龐德公襄陽人居峴山之南未嘗入城府躬耕田里夫妻相待如賓琴書自娛覩其貌者肅如也荊州牧劉表數延請不能屈乃自往候之諸葛亮孔明每至公家獨拜公於床下公殊不令止司馬德操嘗造公值公渡止先人墓操徑入堂上呼德公妻子使作黍徐元直向言有客即來就公談論妻子皆奔走供設德操少德公十歲以兄事之呼作龐公也人乃謂公是德公名非也後逐攜其妻子登鹿門山託言採藥因不知所在從子統龐統統字士元少未有識者惟德公重之年十八使詣司馬德操德操與語自晝達夜乃嘆息曰德公誠知人此實盛德也必南州士之冠冕由是顯名後劉備訪世事於德操曰後生俗士豈識時務者在乎俊傑此間有臥龍鳳雛備問誰曰諸葛孔明龐士元也王逸後漢王逸字叔師南郡宜城人元初中舉上計吏為校書郎累至侍中著楚詞章句行於世其賦誄書論及雜文凡二十一篇作漢詩百二十三篇子延壽字文考作靈光殿賦蔡邕亦造此賦未成及見甚奇之逐輟翰曾有奇夢惡之作夢賦以自勵後溺死蔡瑁後漢蔡瑁字德珪襄陽人性豪自喜少為魏武所親劉琮之敗武帝造其家瑁私室呼見其妻瑁曰德珪故憶往昔共見梁孟星孟星不見人時否聞今在此那得面目見卿邪是時瑁家在蔡州上屋宇甚好四墻皆以青石結角婢妾數百人別業四五十處漢末諸蔡最盛楊慮後漢楊慮字威方襄陽人少有德行為南冠冕州郡禮重諸公辟命皆不能屈年十七而夭門徒數百人宗其德範號為德行楊君許洗是慮同里人少師慮為魏武從事中郎事劉備昔在劉表坐論陳元德者其人也慮弟儀繁仲皇後漢繁仲皇襄陽人為青州刺史自爾以來雖無名德重位世世作書生門戶習融後漢習融襄陽人有德行不仕子郁字文通為黃門侍郎封襄陽公習溫習溫識度廣大歷長沙武昌太守選曹尚書廣州刺史從容朝位三十年不立名跡不結權豪飲酒一石乃醉有別業任洛上每休沬常宴其中長子宇執法郎曾取急趨車乘道從甚盛溫怒杖責之曰吾聞生於亂世貴而能貧始可以亡患况復以侈靡競乎黃承彥黃承彥高爽開朗為南名士謂孔明曰聞君擇婦身有醜女黃頭黑面才堪相配孔明許即載送之時人以為笑樂鄉里為之諺曰莫作孔明擇婦正得阿承醜女馬良蜀馬良字季常襄陽宜城人也兄弟五人並有才名而良稱白眉先主領荊州辟良為從事廖化蜀廖化本名淳中盧人也世為南冠族為關羽前將軍主簿敗沒於吳思嚮劉備乃詐死因將老母書夜西奔備於秭歸備大悅以為宜都太守後為亮眾軍董恢蜀董恢字休緒襄陽人事先主為宣信中郎諸葛辟為丞相府屬遷巴郡太守侍中董充等共期游宴即命解驂李衡吳李衡字叔平襄陽人習竺以女英習配之漢末為丹陽太守衡每欲治家事英習不聽後密遣客十人往武陵龍陽泛洲上作宅種橘千株臨死敕兒曰汝母每怒吾治家事故窮如是然吾州里有千頭木奴不責汝食歲上匹絹亦當足用爾衡既亡後二十餘日兒以白英習曰此當是種柑也汝家失十客來七八年必汝父遣為宅汝父恒稱太史公言江陵千樹橘當封君家吾答云士患無德義不患不富若貴而能貧方好爾用此何為吳末衡柑成歲得絹數千匹家道富足晉咸康中其宅上枯藁猶在韓係伯齊韓係伯襄陽人也事父母謹鄰居種桑樹於界上為誌係伯以桑枝蔭妨他地遷數尺鄰畔隨復侵之係伯輒更改種鄰人慚愧還所侵地躬往謝之郭祖深梁郭祖深襄陽人也武帝溺情內教朝政縱弛祖深輿詣闕上封事蔡道貴齊蔡道貴襄陽人拳勇秀出當時以比關羽張飛魚弘梁魚弘襄陽人白晢美姿容凡五為太守卒官
